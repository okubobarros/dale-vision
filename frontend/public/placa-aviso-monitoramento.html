<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Placa de Aviso - Monitoramento</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        padding: 32px;
        font-family: Arial, Helvetica, sans-serif;
        background: #ffffff;
        color: #0f172a;
      }
      .card {
        border: 4px solid #0f172a;
        padding: 28px;
        max-width: 720px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 16px 0;
        font-size: 28px;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }
      p {
        margin: 0 0 16px 0;
        font-size: 18px;
        line-height: 1.5;
      }
      .footnote {
        font-size: 14px;
        color: #334155;
      }
      @media print {
        body {
          padding: 0;
        }
        .card {
          border-width: 3px;
          min-height: 100vh;
          box-sizing: border-box;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Este ambiente é monitorado</h1>
      <p>
        Este ambiente é monitorado por câmeras e por sistema de inteligência artificial para fins de
        segurança, auditoria e melhoria da operação.
      </p>
      <p class="footnote">
        Em caso de dúvidas, procure o responsável pela loja.
      </p>
    </div>
  </body>
</html>
