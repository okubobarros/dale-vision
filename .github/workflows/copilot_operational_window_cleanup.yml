name: Copilot Operational Window Cleanup

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      retention_days:
        description: "Dias de retenção (>=1)"
        required: false
        default: "30"
      dry_run:
        description: "Executar sem deletar (true/false)"
        required: false
        default: "false"

concurrency:
  group: copilot-operational-window-cleanup
  cancel-in-progress: false

jobs:
  run-cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DEBUG: "0"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS || 'api.dalevision.com,.onrender.com' }}
      COPILOT_OPERATIONAL_WINDOW_RETENTION_DAYS: ${{ github.event.inputs.retention_days || vars.COPILOT_OPERATIONAL_WINDOW_RETENTION_DAYS || '30' }}
      COPILOT_OPERATIONAL_WINDOW_RETENTION_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.prod.txt

      - name: Run operational window cleanup
        run: |
          DRY_RUN_FLAG=""
          if [ "${COPILOT_OPERATIONAL_WINDOW_RETENTION_DRY_RUN}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python manage.py copilot_operational_window_cleanup \
            --retention-days "${COPILOT_OPERATIONAL_WINDOW_RETENTION_DAYS}" \
            ${DRY_RUN_FLAG}
