name: Keep API Warm

on:
  schedule:
    # 08:00-22:00 BRT (UTC-3) -> 11:00-01:00 UTC
    - cron: "*/15 11-23 * * *"
    - cron: "*/15 0-1 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping public health endpoints
        shell: bash
        run: |
          set -euo pipefail
          urls=(
            "https://api.dalevision.com/health/"
            "https://api.dalevision.com/api/health/auth/"
          )
          for url in "${urls[@]}"; do
            echo "Pinging: $url"
            curl --silent --show-error --fail --max-time 20 "$url" > /dev/null
          done
          echo "Keep-warm ping completed."
