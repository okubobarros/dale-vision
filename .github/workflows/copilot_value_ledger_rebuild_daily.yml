name: Copilot Value Ledger Rebuild Daily

on:
  schedule:
    - cron: "10 3 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Data alvo YYYY-MM-DD (default: ontem UTC)"
        required: false
        default: ""
      store_id:
        description: "UUID da loja (opcional)"
        required: false
        default: ""
      org_id:
        description: "UUID da organização (opcional)"
        required: false
        default: ""
      delete_orphans:
        description: "Remover linhas órfãs do ledger no período (0|1)"
        required: false
        default: "0"
      snapshot_days:
        description: "Janela de snapshot após rebuild"
        required: false
        default: "7"
      snapshot_max_stores:
        description: "Máximo de lojas no snapshot"
        required: false
        default: "20"
      snapshot_slo_seconds:
        description: "SLO de frescor em segundos no snapshot"
        required: false
        default: "900"

concurrency:
  group: copilot-value-ledger-rebuild-daily
  cancel-in-progress: false

jobs:
  rebuild-ledger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DEBUG: "0"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS || 'api.dalevision.com,.onrender.com' }}
      WORKFLOW_TARGET_DATE: ${{ github.event.inputs.target_date || '' }}
      WORKFLOW_STORE_ID: ${{ github.event.inputs.store_id || '' }}
      WORKFLOW_ORG_ID: ${{ github.event.inputs.org_id || '' }}
      WORKFLOW_DELETE_ORPHANS: ${{ github.event.inputs.delete_orphans || '0' }}
      SNAPSHOT_DAYS: ${{ github.event.inputs.snapshot_days || vars.COPILOT_LEDGER_SNAPSHOT_DAYS || '7' }}
      SNAPSHOT_MAX_STORES: ${{ github.event.inputs.snapshot_max_stores || vars.COPILOT_LEDGER_SNAPSHOT_MAX_STORES || '20' }}
      SNAPSHOT_SLO_TARGET_SECONDS: ${{ github.event.inputs.snapshot_slo_seconds || vars.COPILOT_LEDGER_SNAPSHOT_SLO_SECONDS || '900' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.prod.txt

      - name: Resolve target date
        id: target-date
        run: |
          if [ -n "${WORKFLOW_TARGET_DATE}" ]; then
            TARGET_DATE="${WORKFLOW_TARGET_DATE}"
          else
            TARGET_DATE="$(date -u -d 'yesterday' +%F)"
          fi
          echo "target_date=${TARGET_DATE}" >> "$GITHUB_OUTPUT"
          echo "Target date: ${TARGET_DATE}"

      - name: Rebuild value ledger for target date
        run: |
          CMD=(python manage.py rebuild_value_ledger_daily --date "${{ steps.target-date.outputs.target_date }}")
          if [ -n "${WORKFLOW_STORE_ID}" ]; then CMD+=(--store-id "${WORKFLOW_STORE_ID}"); fi
          if [ -n "${WORKFLOW_ORG_ID}" ]; then CMD+=(--org-id "${WORKFLOW_ORG_ID}"); fi
          if [ "${WORKFLOW_DELETE_ORPHANS}" = "1" ]; then CMD+=(--delete-orphans); fi
          "${CMD[@]}"

      - name: Generate health snapshot artifact
        run: |
          mkdir -p artifacts
          python manage.py copilot_value_ledger_health_snapshot \
            --days "${SNAPSHOT_DAYS}" \
            --max-stores "${SNAPSHOT_MAX_STORES}" \
            --slo-target-seconds "${SNAPSHOT_SLO_TARGET_SECONDS}" \
            --json-output "artifacts/value_ledger_health_snapshot_after_rebuild.json"

      - name: Upload rebuild evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: value-ledger-rebuild-evidence
          path: artifacts/value_ledger_health_snapshot_after_rebuild.json
