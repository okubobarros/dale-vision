name: Copilot Operational Window Tick

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      window_minutes:
        description: "Janela operacional (5 ou 10)"
        required: false
        default: "5"
      max_stores:
        description: "Máximo de lojas por execução"
        required: false
        default: "500"

concurrency:
  group: copilot-operational-window-tick
  cancel-in-progress: false

jobs:
  run-tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DEBUG: "0"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS || 'api.dalevision.com,.onrender.com' }}
      COPILOT_OPERATIONAL_WINDOW_MINUTES: ${{ github.event.inputs.window_minutes || vars.COPILOT_OPERATIONAL_WINDOW_MINUTES || '5' }}
      COPILOT_OPERATIONAL_WINDOW_MAX_STORES: ${{ github.event.inputs.max_stores || vars.COPILOT_OPERATIONAL_WINDOW_MAX_STORES || '500' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.prod.txt

      - name: Run operational window tick
        run: |
          python manage.py copilot_operational_window_tick \
            --window-minutes "${COPILOT_OPERATIONAL_WINDOW_MINUTES}" \
            --max-stores "${COPILOT_OPERATIONAL_WINDOW_MAX_STORES}"
